name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Run Ruff
        id: ruff
        continue-on-error: true
        run: uv run ruff check . --output-format=json > ruff-report.json
      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.json
      - name: Run tests
        run: uv run pytest --cov=opportunityos --cov-report=term-missing
      - name: Enforce Ruff
        if: steps.ruff.outcome == 'failure'
        run: exit 1
