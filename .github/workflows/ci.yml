name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Run Ruff
        id: ruff
        continue-on-error: true
        run: uv run ruff check . --output-format=json > ruff-report.json
      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.json
      - name: Run tests
        run: uv run pytest --cov=opportunityos --cov-report=term-missing
      - name: Enforce Ruff
        if: steps.ruff.outcome == 'failure'
        run: exit 1

  staging-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create CI staging environment
        run: |
          cat > .env.staging <<'EOF'
          COMPOSE_PROJECT_NAME=opportunityos_ci
          APP_NAME=OpportunityOS-CI
          STAGING_PORT=8000
          POSTGRES_DB=opportunityos
          POSTGRES_USER=opportunityos
          POSTGRES_PASSWORD=ci_only_long_hex_password_0123456789abcdef
          LLM_MODE=mock
          ORCHESTRATOR=local
          RUN_MIGRATIONS=true
          WEB_CONCURRENCY=1
          FORWARDED_ALLOW_IPS=127.0.0.1
          EOF
      - name: Validate staging configuration
        run: docker compose --env-file .env.staging -f docker-compose.staging.yml config
      - name: Build staging image
        id: staging_build
        continue-on-error: true
        run: |
          set -o pipefail
          docker compose --env-file .env.staging -f docker-compose.staging.yml build --progress=plain 2>&1 | tee staging-build.log
      - name: Upload staging build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-build-log
          path: staging-build.log
      - name: Enforce staging build
        if: steps.staging_build.outcome == 'failure'
        run: exit 1
      - name: Start staging stack
        run: docker compose --env-file .env.staging -f docker-compose.staging.yml up -d
      - name: Verify health and web workspace
        run: ENV_FILE="$PWD/.env.staging" bash scripts/verify_staging.sh
      - name: Verify PostgreSQL profile onboarding
        run: |
          cat > ci-resume.txt <<'EOF'
          Senior data scientist and product analytics leader with Python, SQL, retention,
          growth experimentation, forecasting, stakeholder management, and AI innovation experience.
          EOF
          curl --fail --silent --show-error \
            -X POST http://127.0.0.1:8000/v1/profiles/onboard-file \
            -F 'display_name=CI PostgreSQL User' \
            -F 'headline=Fractional Data and AI Lead' \
            -F 'email=ci-postgres@example.com' \
            -F 'file=@ci-resume.txt;type=text/plain' \
            > onboarding-response.json
          USER_ID="$(python3 -c 'import json; print(json.load(open("onboarding-response.json"))["profile"]["user_id"])')"
          test -n "${USER_ID}"
          curl --fail --silent --show-error \
            "http://127.0.0.1:8000/v1/users/${USER_ID}/memory" \
            > memory-response.json
          python3 - <<'PY'
          import json

          payload = json.load(open("memory-response.json"))
          assert payload["items"], "onboarding did not persist memory"
          assert any(item["category"] == "capability" for item in payload["items"])
          PY
      - name: Show container logs
        if: always()
        run: docker compose --env-file .env.staging -f docker-compose.staging.yml logs --no-color --tail=200
      - name: Stop staging stack
        if: always()
        run: docker compose --env-file .env.staging -f docker-compose.staging.yml down -v
