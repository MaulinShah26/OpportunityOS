services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opportunityos
      POSTGRES_USER: opportunityos
      POSTGRES_PASSWORD: opportunityos
    ports: ["5432:5432"]
    volumes: ["opportunityos_postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opportunityos -d opportunityos"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  opportunityos_postgres:
